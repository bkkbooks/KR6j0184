body:
  text: 新譯仁王般若經陀羅尼念誦軌儀序大興善寺翻經沙門慧靈述我皇帝聖德廣運仁育群品亦既纂曆吹大法螺刊梵言之輕重警迷徒之耳目偉矣哉迺辟興善寺大廣智三藏不空與義學沙門良賁等一十四人開府魚朝恩翰林學士常袞等去歲夏四月於南桃園再譯斯經秋九月詔資聖西明百座敷闡下紫微而五雲抱出經長衢而萬姓作禮阡郭充滿猶墻堵焉稽緇衣覽青史自摩騰入漢僧會遊吳瑞法之來莫與京者經云若未來世有諸國王建立正法護三寶者我令五方菩薩往護其國令無災難又云五菩薩自於佛前發弘誓言我有陀羅尼能加持擁護是一切佛本所修行速疾之門若人得聞一經於耳所有罪障悉皆消滅況復習誦而令通利佛即讚言若誦持此陀羅尼者我及十方諸佛悉常擁護諸惡鬼神敬之如佛不久當得阿耨菩提則知此陀羅尼字母之根底眾瑜伽之藪澤如彼水木歸其本源故菩薩演之王者建之黎人念之諸佛讚之俾爾昌而熾俾爾福而利於可以見聖人之心其益既弘其軌亦妙苟于誠不克曷降之以嘉三藏是以譯具多之文良賁法師乃受從簡素始夫處所方便終其觀行儀則修為十門第以位次一一昭著庶無懵焉凡我道俗將保厥躬遂求願踐菩提之路登仁壽之域者何莫由斯之道哉
