body:
  text: 開府儀同三司特進試鴻臚卿肅國公食邑三千戶賜紫贈司空謚大鑒正號大廣智大興善寺三藏沙門不空奉詔譯爾時佛告波斯匿王今為王說仁王護國般若波羅蜜多持明之法王當諦受一心善聽先明入道場儀軌若諸仁王為求息災先須沐浴著新淨衣若法行王者受近住戒應起殷重大乘之心欲求成就不惜身命於無邊有情廣起悲願濟度之心能如是者速得成就入道場已五體投地遍禮法界一切三寶右膝著地懺悔三業一切罪障勸十方佛轉正法輪請諸如來久住於世隨喜三乘所修福智以我某甲所修功德悉皆迴向無上菩提願共法界一切有情所求悉地速得滿足次結跏趺坐如其闕緣不得澡浴二手塗香發慇重心結清淨印兩手當心虛心合掌如未敷蓮華誦真言曰唵娑嚩二合婆引嚩輸入鐸引薩嚩達磨引娑嚩二合婆嚩輸度撼誦此真言三遍正誦之時運心廣布一切諸法本來清淨是故我身亦悉清淨即閉目運想遍滿虛空一切諸佛菩薩道場眾會執持種種上妙香花三業至誠頭面禮敬第一結佛部三昧耶印兩手當心內相叉作拳並竪二大拇指誦真言曰唵爾那爾迦娑嚩二合引訶去引不出聲誦此真言三遍下皆准知於頂上散由結此印契誦此佛部三昧耶真言故十方法界一切諸佛悉皆雲集遍滿虛空加持行者離諸障惱三業清淨所修行願速得成就第二結諸菩薩部三昧耶印兩手當心如前作拳左大拇指屈於掌中誦真言曰唵阿引嚧引力迦娑嚩二合訶去準前誦三遍於頂上散由結此印契誦此諸菩薩部三昧耶真言故即得觀自在菩薩等十方法界一切菩薩悉皆雲集遍滿虛空加持行法行者三業清淨無諸災難謂諸菩薩承本悲願令所求者皆悉滿足第三結金剛部三昧耶印右如前印舒左大拇指屈右大拇指於掌中誦真言曰唵嚩日囉二合地力迦娑嚩二合引訶准前誦三遍於頂上散由結此印契誦金剛部三昧耶真言故即得十方法界一切金剛現威怒身如雲而集滿虛空界加持行法行者三業堅固猶如金剛謂彼聖者承佛威神以自願力大則護持國界令無災難小則乃至一身令無諸厄第四結護身印又用三部所結印契及誦真言五處加持謂額左肩右肩心喉五處於頂上散即成被金剛堅固甲冑由此加持遍行者身威光赫𭴢一切諸魔作障惱者眼不敢覩疾走而去第五結辟除印及金剛方隅寶界印右以前金剛部印契誦彼真言繞壇左轉三匝即能辟除大力諸魔隨佛菩薩若有隱者遠去他界隨心大小右轉三匝即成金剛方隅寶界諸佛菩薩尚不違越況障惱者能得其便於頂上散第六結請聖眾降壇印右用前三部印契及誦真言以大拇指向身招請三遍三招即前滿空三部聖眾各依本位不相障礙寂然而住頂上散第七獻閼伽香水印右以兩手持捧摩尼寶器盛香水置於眉間誦真言曰唵嚩日囉二合引娜迦吽引準上誦三遍運心廣布次第普浴一切聖眾於頂上散由獻閼伽故從勝解行地乃至法雲地於地地中十方法界諸佛菩薩皆悉加護諸佛灌頂第八獻寶座印右以兩手當心虛心合掌二大拇指及二小指相附少屈餘之六指各散微屈如開敷蓮華真言曰唵迦磨攞娑嚩二合引訶由結印契及誦真言所獻寶座令諸聖眾皆如實受用則令行法行者至果位中獲得金剛堅固寶座第九結普供養印右以兩手合掌五指互交以右押左置於心上誦真言曰娜莫三曼多沒馱引南引薩嚩他欠平烏娜誐二合諦薩頗二合囉呬引𤚥誐誐曩上劍娑嚩二合引訶由結此印誦真言故蓮心廣布周遍法界諸佛菩薩道場海會普雨一切諸供養具初誦一遍塵沙寶器滿盛塗香普塗聖眾誦第二遍種種花鬘普遍莊嚴誦第三遍燒種種香普遍供養誦第四遍雨諸天中上妙飲食置於寶器普遍供養誦第五遍雨諸摩尼以為燈明普遍供養諸佛菩薩由誦真言加持力故所獻香等於諸海會悉皆真實聖眾受用行法行者於當來世常獲是報第十結般若波羅蜜多根本印又以兩手背相附收二頭指以二小指屈於掌中以大拇指各押二指頭置於心上誦經中陀羅尼七遍由結此印誦陀羅尼故行法行者自身即便變成般若波羅蜜多菩薩而為一切諸佛之母其菩薩像結跏趺坐白蓮華上身黃金色眾寶瓔珞遍身莊嚴首戴寶冠繫冠白繒兩邊垂下左手當心持般若梵夾右手當乳作說法印以大拇指押無名指頭即想菩薩從頂至足身諸毛孔流出光明作種種色遍滿法界一一光中化無量佛遍虛空界諸世界中普為眾生當根宣說般若波羅蜜多甚深之法皆令悟解住三摩地行法行王作此觀已頂上散印手持數珠置於掌中合掌當心誦真言曰唵尾嚧者那引麼攞娑嚩二合引訶引誦此三遍加持數珠頂上戴已然後當心左手承珠右手移珠念念相應住佛母三昧觀心莫間斷誦一百八遍或二十一遍誦真言曰娜謨囉怛娜二合怛囉二合夜野一娜莫引阿哩夜二合吠無蓋反𡀔者娜野二怛他引多引夜囉訶二合諦三三貌三沒馱引野四娜莫阿引哩野二合五三滿多跋捺囉二合引野六地薩怛嚩二合引野七摩賀薩怛嚩二合引野八摩賀迦引嚕抳迦引野九怛儞野二合他十引枳穰二合娜鉢囉二合儞引閉十一惡乞叉二合野句勢十二鉢囉二合底婆引娜嚩底十三薩嚩沒馱引嚩路枳諦十四喻誐跛哩儞澁跛二合寧十五儼避引囉努囉嚩誐引係十六底哩野三合特嚩二合十七跛哩儞澁跛二合寧十八地質多散惹娜儞十九薩嚩引毘曬迦引毘色訖諦二合二十達磨娑引誐囉三步諦二十一阿慕伽室囉二合嚩儜二十二摩賀三滿多跋捺囉二合步彌二十三涅奴逸反哩野二合諦二十四尾野二合羯囉拏二十五跛哩鉢囉二合跛儞二十六薩嚩悉馱二十七娜麼塞訖哩二合諦二十八薩嚩冒地薩怛嚩二合二十九散惹娜儞三十婆誐嚩底丁以反引三十一沒馱引麼諦三十二阿囉嬭迦囉嬭三十三阿囉拏迦囉嬭三十四摩賀鉢囉二合枳穰二合三十五播囉弭諦娑嚩二合引賀三十六如是依前至心誦念遍數足已即頂戴數珠置於本處結三摩地印橫舒兩手以右押左置於臍下端身閉目頭少微屈專注心上諦觀圓明鏡智上縱廣一肘漸遍法界布字行列右旋次第觀一一字光明徹照從外向內至於地字從內向外漸觀諸字周而復始至第三遍心善寂定了了分明觀所詮義不生不滅一一平等皆遍法界非動非靜定慧雙運永離諸相即是般若波羅蜜多三摩地觀從此却結般若波羅蜜多印誦陀羅尼七遍於頂上散次結普供養印如前運心次第供養對聖眾前以向所修所生功德盡將資益所求諸願為國為家利他滿足然後迴施眾生迴嚴淨土迴向實際迴求無上菩提願共有情速至彼岸次結前結界印誦前真言三遍左轉即成解界次結前三部印誦前真言三遍皆以大拇指向外撥之即成發遣聖眾各歸本土行者作禮而去如常經行受持讀誦大乘勿散動也如是五更至於晨朝以為初時從日午後至於未時為第二時從黃昏後至於中夜為第三時從中夜後至於五更為第四時如是時中各依本數精勤不怠一切他敵自然降伏一切災難永不復生爾時波斯匿王聞佛說已即從坐起作禮圍繞歡喜踊躍信受奉行
